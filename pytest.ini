; testpaths is an explicit allowlist of skill test dirs. New skills must add
; their tests/ here. The alternative (rootdir-based auto-discovery) was
; considered and rejected: it would pick up untracked experimental test
; files inside third-party skill directories, and would also fail in any
; sub-directory that has a stray pytest.ini of its own.
[pytest]
testpaths = git-commit-helper/tests list-git-repos/tests plan-doc-sequence/tests staged-doc-naming/tests
